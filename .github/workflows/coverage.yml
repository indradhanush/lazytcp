name: Coverage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: Coverage Badge Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install llvm-tools
        run: rustup component add llvm-tools

      - name: Run coverage
        run: make coverage

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(cat target/coverage/total.txt)
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE%"

      - name: Determine badge color
        id: badge-color
        run: |
          COVERAGE=${{ steps.coverage.outputs.percentage }}
          COVERAGE_INT=${COVERAGE%.*}
          COLOR="red"
          if [ "$COVERAGE_INT" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE_INT" -ge 60 ]; then
            COLOR="yellow"
          elif [ "$COVERAGE_INT" -ge 40 ]; then
            COLOR="orange"
          fi
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_API_TOKEN }}
          gistID: 97cfd90277d7142cfe8dc5f56e952172
          filename: lazytcp.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.badge-color.outputs.color }}
